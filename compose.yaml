services:
  db:
    image: mysql:8.0
    container_name: vulcan-db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports: ["${DB_PORT}:3306"]
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: vulcan-backend
    ports: ["${BACKEND_PORT}:8000"]
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-vulcan}
      DB_USERNAME: ${MYSQL_USER:-vulcan_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-vulcan123}
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
      SESSION_DRIVER: file
    volumes:
      - ./backend:/var/www/html:cached
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: vulcan-phpmyadmin
    ports: ["${PMA_PORT:-8080}:80"]
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: vulcan-frontend
    ports: ["${FRONTEND_PORT}:5173"]
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
    name: vulcan-mysql_data
